name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' 
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-latest'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Movie Tracker ${{ github.ref_name }}'
          releaseBody: |
            🎬 **Movie Tracker ${{ github.ref_name }}**
            
            See the assets below to download and install this version.
            
            ## 📦 Downloads
            - **Windows**: `Movie_Tracker_${{ github.ref_name }}_x64-setup.exe`
            - **macOS**: `Movie Tracker_${{ github.ref_name }}_x64.dmg` (Intel) or `Movie Tracker_${{ github.ref_name }}_aarch64.dmg` (Apple Silicon)
            - **Linux**: `Movie Tracker_${{ github.ref_name }}_amd64.AppImage`
            
            ## ✨ Features
            - Universal search across movies and series
            - Beautiful gradient search bar with hover effects
            - Clean navigation without AI picks
            - Professional UI with glass morphism effects
            - Local storage for privacy
            - Cross-platform support
            
            ## 🚀 Installation
            1. Download the appropriate file for your platform
            2. Run the installer
            3. Launch Movie Tracker and enjoy!
            
            ---
            Built with ❤️ using Tauri + React
          releaseDraft: false
          prerelease: false
          includeDebug: false
          includeRelease: true
          args: ${{ matrix.args }}
